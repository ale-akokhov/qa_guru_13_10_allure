plugins {
    id 'java'
    id 'io.qameta.allure' version '4.0.1'
}

group = 'guru.qa'
version = '1.0'

repositories {
    mavenCentral()
}

allure {
    report {
        version.set("2.39.0")
    }
    adapter {
        frameworks {
            junit5 {
                adapterVersion.set("2.29.1")
            }
        }
    }
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation(
            'org.junit.jupiter:junit-jupiter',
            'com.codeborne:selenide:7.16.0',
            'org.slf4j:slf4j-simple:2.0.16'
    )
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}